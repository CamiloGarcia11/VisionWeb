    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Fondo con la estética de la imagen que enviaste */
        .hero-bg {
            background: radial-gradient(circle at 20% 30%, #0c4a6e 0%, #082f49 40%, #020617 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Ondas animadas en el fondo */
        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, rgba(14, 165, 233, 0.1) 0%, transparent 70%);
            border-radius: 40%;
            animation: move 15s infinite linear;
            z-index: 1;
        }
        
        .wave:nth-child(2) { animation-duration: 20s; opacity: 0.5; background: linear-gradient(45deg, rgba(99, 102, 241, 0.1) 0%, transparent 70%); }

        @keyframes move {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .animate-typing {
            overflow: hidden;
            border-right: 3px solid #0ea5e9;
            white-space: nowrap;
            margin: 0 auto;
            animation: typing 3s steps(30, end) infinite alternate, blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { 50% { border-color: transparent } }
    </style>
</head>
